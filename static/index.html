<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>DocBot</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #222; }                                                     
      h1 { margin-bottom: 0.25rem; }                                              
      .sub { color: #666; margin-top: 0; font-size: 0.9rem; }                                                                                                             
      #messages { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; height: 60vh; overflow-y: auto; background: #fafafa; }
      .msg { margin-bottom: 1rem; }         
      .user { font-weight: 600; }          
      .bot { white-space: pre-wrap; }       
      .sources { margin-top: 0.5rem; font-size: 0.8rem; color: #555; }                                                                                                    
      .sources code { background: #eee; padding: 1px 4px; border-radius: 3px; }
      form { display: flex; gap: 0.5rem; margin-top: 1rem; }                                                                                                              
      input { flex: 1; padding: 0.6rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; }
      button { padding: 0.6rem 1rem; font-size: 1rem; border: 0; background: #222; color: #fff; border-radius: 6px; cursor: pointer; }                                    
      button:disabled { background: #aaa; cursor: not-allowed; }   
    </style>
</head>
<body>
    <h1>DocBot</h1>                         
    <p class="sub">Ask questions about the PostHog handbook.</p>                                                                                                          
                                                                                                                                                                          
    <div id="messages"></div>                                                                                                                                             
                                                                                                                                                                          
    <form id="chat-form">                                                                                                                                                 
      <input id="input" type="text" placeholder="Ask a question…" autocomplete="off" required />                                                                          
      <button id="send" type="submit">Send</button>                                
    </form>                                                                                                                                                               
                                                                                   
    <script>                                                                                                                                                              
      const messagesEl = document.getElementById("messages");
      const form = document.getElementById("chat-form");                                                                                                                  
      const input = document.getElementById("input");                              
      const button = document.getElementById("send");
                                                                                                                                                                          
      function appendMsg(role, text, sources) {
        const div = document.createElement("div");                                                                                                                        
        div.className = "msg";                                                     
        const who = document.createElement("div");                                                                                                                        
        who.className = role;                                                      
        who.textContent = (role === "user" ? "You: " : "DocBot: ") + text;
        div.appendChild(who);                                                                                                                                             
        if (sources && sources.length) {   
          const s = document.createElement("div");                                                                                                                        
          s.className = "sources";                                                 
          s.innerHTML = "Sources: " + sources.map(x => `<code>${x}</code>`).join(" ");
          div.appendChild(s);                                                                                                                                             
        }                   
        messagesEl.appendChild(div);                                                                                                                                      
        messagesEl.scrollTop = messagesEl.scrollHeight;                                                                                                                   
      }                                    
                                                                                                                                                                          
      form.addEventListener("submit", async (e) => {                                                                                                                      
        e.preventDefault();
        const message = input.value.trim();                                                                                                                               
        if (!message) return;                                                      
        appendMsg("user", message);                                                                                                                                       
        input.value = "";                                                          
        button.disabled = true;                                                                                                                                           
        try {                              
          const res = await fetch("/chat", {                                                                                                                              
            method: "POST",                                                        
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),                                                                                                                            
          });                              
          const data = await res.json();                                                                                                                                  
          appendMsg("bot", data.reply, data.sources);                              
        } catch (err) {     
          appendMsg("bot", "Error: " + err.message);                                                                                                                      
        } finally {                      
          button.disabled = false;                                                                                                                                        
          input.focus();                                                           
        }          
      });                                  
    </script>     
</body>
</html>
